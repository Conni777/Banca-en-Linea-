openapi: 3.0.0
info:
  title: API Banca en Línea
  description: Documentación de la API para el proyecto de Banca en Línea
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Servidor Local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /:
    get:
      summary: Ruta base de prueba
      tags: [General]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Servidor de Banca Online Operativo
  /api/auth/register:
    post:
      summary: Registrar un nuevo usuario
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - nombre
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                nombre:
                  type: string
      responses:
        '201':
          description: Usuario registrado exitosamente
        '400':
          description: Faltan campos requeridos o error de registro
        '500':
          description: Error interno del servidor
  /api/auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login exitoso, devuelve el token JWT
        '400':
          description: Faltan campos requeridos
        '401':
          description: Credenciales inválidas
        '500':
          description: Error interno del servidor
  /api/auth/me:
    get:
      summary: Obtener perfil del usuario actual
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Datos del usuario recuperados exitosamente
        '401':
          description: No autorizado
  /api/transacciones:
    get:
      summary: Obtener historial de transacciones del usuario
      tags: [Transacciones]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de transacciones
        '401':
          description: No autorizado
  /api/transacciones/abonar:
    post:
      summary: Realizar un abono a una cuenta
      tags: [Transacciones]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - usuario_id
                - monto
              properties:
                usuario_id:
                  type: integer
                  description: ID numérico del usuario
                monto:
                  type: number
                  format: float
                  description: Monto a abonar
      responses:
        '200':
          description: Abono realizado con éxito
  /api/transacciones/transferir:
    post:
      summary: Realizar una transferencia entre cuentas
      tags: [Transacciones]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - usuario_id_origen
                - usuario_id_destino
                - monto
              properties:
                usuario_id_origen:
                  type: integer
                  description: ID del usuario que envía el dinero
                usuario_id_destino:
                  type: string
                  description: CORREO ELECTRÓNICO del usuario que recibe el dinero
                monto:
                  type: number
                  format: float
                  description: Monto a transferir
      responses:
        '200':
          description: Transferencia realizada con éxito
